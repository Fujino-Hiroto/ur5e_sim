/pointcloud_noiser:
  ros__parameters:
    block_count: 8
    block_dropout: true
    block_radius_px: 6
    dropout_p: 0.01
    enable_flicker: true
    flicker_amp: 0.6
    flicker_hz: 1.0
    frame_drop_p: 0.0
    gauss_a: 0.003
    gauss_b: 0.0005
    in_topic: /camera/depth/points
    max_z: 5.0
    min_z: 0.0
    out_topic: /camera/depth/points_noisy
    seed: 42
    spike_max_factor: 0.8
    spike_min_factor: 0.3
    spike_p: 0.002
    use_sim_time: false

