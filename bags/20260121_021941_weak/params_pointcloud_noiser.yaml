/pointcloud_noiser:
  ros__parameters:
    block_count: 4
    block_dropout: true
    block_radius_px: 4
    dropout_p: 0.01
    enable_flicker: false
    flicker_amp: 0.5
    flicker_hz: 1.0
    frame_drop_p: 0.0
    gauss_a: 0.0015
    gauss_b: 0.0006
    in_topic: /camera/depth/points
    max_z: 5.0
    min_z: 0.0
    out_topic: /camera/depth/points_noisy
    seed: 42
    spike_max_factor: 0.9
    spike_min_factor: 0.3
    spike_p: 0.002
    use_sim_time: false

